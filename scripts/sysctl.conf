# /etc/sysctl.d/99-veltrixdb.conf
# Copy to /etc/sysctl.d/ and run: sysctl --system

# ── HugePages (required for C++ ART slab allocator) ──────────────────────────
# 512 × 2MB = 1 GiB of hugepages.
# Increase if ArtSlabAllocator logs "hugepage allocation failed".
vm.nr_hugepages = 512

# ── File descriptor limits ────────────────────────────────────────────────────
# VeltrixDB opens: 8 segment files + 8 WAL files + TCP connections per client.
fs.file-max = 2097152

# ── io_uring locked memory ────────────────────────────────────────────────────
# io_uring_register_buffers requires RLIMIT_MEMLOCK for fixed buffer mapping.
# Set to max (unlimited) so the registered buffer pool is never rejected.
# Equivalent to: ulimit -l unlimited
# Note: this sysctl does not set per-process memlock; set via limits.conf too.

# ── TCP tuning (for high-concurrency client connections) ─────────────────────
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728
net.core.netdev_max_backlog = 65536
net.ipv4.tcp_max_syn_backlog = 65536

# ── NVMe I/O scheduler ────────────────────────────────────────────────────────
# Set per device after boot (see hugepages.sh for the full setup script).
# echo "none" > /sys/block/nvme0n1/queue/scheduler
