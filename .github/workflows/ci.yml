name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write   # push bench image to GHCR

jobs:
  # ── Node 1: build + unit tests ────────────────────────────────────────────
  node-1-storage:
    name: "Node 1 — build + unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: build
        run: CGO_ENABLED=0 go build ./...

      - name: vet
        run: CGO_ENABLED=0 go vet ./...

      - name: storage + adminapi tests
        run: CGO_ENABLED=0 go test -timeout 120s -count=1 ./storage/... ./adminapi/...

      - name: client + security + tracing tests
        run: CGO_ENABLED=0 go test -timeout 60s -count=1 ./client/... ./security/... ./tracing/...

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "node-1-storage" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── Node 2: consensus + cluster + replication tests ───────────────────────
  node-2-cluster:
    name: "Node 2 — consensus + cluster + replication"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: consensus tests
        run: CGO_ENABLED=0 go test -timeout 120s -count=1 ./consensus/...

      - name: cluster tests
        run: CGO_ENABLED=0 go test -timeout 120s -count=1 ./cluster/...

      - name: replication tests
        run: CGO_ENABLED=0 go test -timeout 120s -count=1 ./replication/...

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "node-2-cluster" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── Node 3: 3-node integration tests ──────────────────────────────────────
  # Spins up 3 real server processes on the runner and runs full integration
  # tests: crash recovery, node failover, leader election, backup/restore.
  node-3-integration:
    name: "Node 3 — 3-node integration"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: build server binary
        run: CGO_ENABLED=0 go build -o /tmp/veltrixdb ./cmd/server

      - name: build backup binary
        run: CGO_ENABLED=0 go build -o /tmp/veltrixdb-backup ./cmd/backup

      - name: integration tests (starts 3 in-process server nodes)
        run: CGO_ENABLED=0 go test -v -timeout 300s -count=1 ./tests/integration/...
        env:
          VELTRIX_SERVER_BIN: /tmp/veltrixdb
          VELTRIX_BACKUP_BIN: /tmp/veltrixdb-backup

      - name: upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-logs
          path: /tmp/veltrix-*/**/*.log
          if-no-files-found: ignore
          retention-days: 3

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "node-3-integration" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── node-4: paper-changes unit tests ─────────────────────────────────────
  # Dedicated job so failures here are clearly attributed to the 5 paper-derived
  # changes (IOPOLL, temperature-weighted GC, defrag thread pinning, cgroup
  # throttle, background tiering) rather than being buried in node-1 output.
  node-4-paper-changes:
    name: "Node 4 — paper-changes unit tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [node-1-storage]
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # change-2: cold-first GC sort
      - name: "change-2 — temperature-weighted GC sort"
        run: CGO_ENABLED=0 go test -v -run "TestGCColdFirstSort" -count=1 ./storage/...

      # change-3: defrag thread pinning (no-op on non-Linux, must not panic anywhere)
      - name: "change-3 — defrag thread pinning"
        run: CGO_ENABLED=0 go test -v -run "TestLockDefragThread" -count=1 ./storage/...

      # change-4+5: FlagTiered constant, NopColdTier correctness, TierManager filtering
      - name: "change-4+5 — FlagTiered / NopColdTier / TierManager"
        run: |
          CGO_ENABLED=0 go test -v -count=1 \
            -run "TestFlagTiered_Constant|TestNopColdTier|TestTierManager|TestNewS3ColdTierSimple|TestNewGCSColdTierSimple" \
            ./storage/...

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "node-4-paper-changes" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── bench: packing density + GC emergency hard gates ──────────────────────
  bench:
    name: "Bench — density + GC gates + paper-changes microbench"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [node-1-storage, node-2-cluster, node-4-paper-changes]
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: install bc + benchstat
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends bc
          go install golang.org/x/perf/cmd/benchstat@latest

      - name: run bench (200K keys, CI scale)
        run: |
          CGO_ENABLED=0 \
          NUM_KEYS=200000 \
          DATA_DIRS=/tmp/veltrixdb-bench \
          CACHE_MB=512 \
            ./scripts/bench.sh

      # ── paper-changes micro-benchmarks ────────────────────────────────────
      # Run 3× for stable numbers; benchstat will report mean ± variance.
      - name: "paper-changes — GC sort benchmarks"
        run: |
          CGO_ENABLED=0 go test \
            -bench="BenchmarkGCColdFirstSort" \
            -benchmem -benchtime=3s -count=3 \
            -run ^$ ./storage/... \
            | tee /tmp/bench-gc-sort.txt
          cat /tmp/bench-gc-sort.txt

      - name: "paper-changes — tiering benchmarks"
        run: |
          CGO_ENABLED=0 go test \
            -bench="BenchmarkNopColdTier|BenchmarkPutColdTier_LocalFS|BenchmarkGetColdTier_LocalFS|BenchmarkTierManager_Enqueue" \
            -benchmem -benchtime=3s -count=3 \
            -run ^$ ./storage/... \
            | tee /tmp/bench-tiering.txt
          cat /tmp/bench-tiering.txt

      # Regression gate: benchstat exits non-zero if delta > threshold.
      # Baseline persists across runs via the actions cache (download-artifact@v4
      # can only see artifacts of the SAME run, so an artifact-based baseline
      # would never be found). On the first run (no cached baseline, e.g. a
      # fresh repository) the check is skipped and this run seeds the cache.
      - name: restore baseline benchmarks
        id: baseline
        uses: actions/cache/restore@v4
        with:
          path: /tmp/bench-baseline
          key: bench-paper-baseline-${{ github.run_id }}
          restore-keys: |
            bench-paper-baseline-

      - name: regression check (±15% threshold)
        if: steps.baseline.outputs.cache-matched-key != ''
        run: |
          cat /tmp/bench-baseline/gc-sort.txt /tmp/bench-gc-sort.txt \
            | benchstat -delta-test=none /dev/stdin \
            | tee /tmp/benchstat-gc-sort.txt
          cat /tmp/bench-baseline/tiering.txt /tmp/bench-tiering.txt \
            | benchstat -delta-test=none /dev/stdin \
            | tee /tmp/benchstat-tiering.txt
          # Fail if any benchmark regressed by more than 15%.
          if grep -E '\+[0-9]{2,}%|\+1[5-9]\.' /tmp/benchstat-gc-sort.txt /tmp/benchstat-tiering.txt; then
            echo "Benchmark regression detected — see output above"
            exit 1
          fi

      # Save this run's numbers as the new baseline (main branch only). The
      # run-id key is always unique, so every main run overwrites the newest
      # baseline; restore-keys prefix-matches the most recent one.
      - name: save benchmark baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          rm -rf /tmp/bench-baseline
          mkdir -p /tmp/bench-baseline
          cp /tmp/bench-gc-sort.txt /tmp/bench-baseline/gc-sort.txt
          cp /tmp/bench-tiering.txt /tmp/bench-baseline/tiering.txt
      - uses: actions/cache/save@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          path: /tmp/bench-baseline
          key: bench-paper-baseline-${{ github.run_id }}

      - name: upload bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-output
          path: |
            /tmp/veltrixdb-bench-out/**
            /tmp/bench-gc-sort.txt
            /tmp/bench-tiering.txt
            /tmp/benchstat-*.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "bench" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── security: govulncheck ──────────────────────────────────────────────────
  security:
    name: "Security — govulncheck"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: scan
        run: CGO_ENABLED=0 govulncheck ./...
        continue-on-error: true

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "security" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"

  # ── docker bench image (push to main only) ────────────────────────────────
  bench-image:
    name: "Docker — bench image"
    runs-on: ubuntu-latest
    needs: [node-1-storage]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: record start time
        id: t0
        run: echo "ts=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: build loadtest binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/veltrixdb-loadtest ./cmd/loadtest

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.bench
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ghcr.io/veltrixdb/veltrixdb-bench:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: push CI metrics
        if: always()
        env:
          PUSH_GW_URL: ${{ secrets.PUSH_GW_URL }}
        run: |
          bash scripts/push-ci-metrics.sh \
            --job    "bench-image" \
            --start  "${{ steps.t0.outputs.ts }}" \
            --status "${{ job.status }}" \
            --run-id "${{ github.run_id }}" \
            --sha    "${{ github.sha }}" \
            --branch "${{ github.ref_name }}"
